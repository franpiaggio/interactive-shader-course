<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Fractals — orbit a KIFS you can touch</title>
<style>
  html,body{margin:0;height:100%;background:#05060a;overflow:hidden;cursor:grab;}
  body.grabbing{cursor:grabbing;}
  canvas{display:block;width:100vw;height:100vh;}
  .hud{position:fixed;left:24px;top:20px;color:#eee;font:600 14px/1.4 ui-monospace,"SF Mono",Menlo,monospace;
       letter-spacing:.04em;text-shadow:0 2px 8px #000;pointer-events:none;}
  .hud .tag{background:#e6885f;color:#1a1208;padding:4px 10px;border-radius:7px;}
  .hint{position:fixed;left:0;right:0;bottom:30px;text-align:center;color:#cfd4e2;
        font:500 18px/1.4 Helvetica,Arial,sans-serif;text-shadow:0 2px 10px #000;
        pointer-events:none;transition:opacity .8s;}
  .credit{position:fixed;right:24px;bottom:22px;font:600 13px/1.3 ui-monospace,monospace;}
  .credit a{color:#ffd9a0;text-decoration:none;pointer-events:auto;text-shadow:0 2px 8px #000;}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="hud"><span class="tag">ONE FRAGMENT SHADER</span> &nbsp;3D fractal · KIFS · drag to orbit</div>
<div class="hint" id="hint">drag to orbit · scroll to zoom · let go and it keeps turning</div>
<div class="credit"><a href="https://franpiaggio.github.io/interactive-shader-course/" target="_blank">learn how → interactive-shader-course</a></div>

<script id="frag" type="x-shader/fragment">
#define TAU 6.28318530718
#define FOLDS 8.0
#define NITER 7
#define STEPS 130
#define FAR 30.0

mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }

// Fire / Flesh palette (crimson -> copper -> gold)
vec3 pal(float t){
    vec3 c = clamp(vec3(0.55,0.32,0.22) + vec3(0.45,0.30,0.22)*cos(TAU*(vec3(1.0,1.0,0.7)*t + vec3(0.00,0.12,0.22))), 0.0, 1.0);
    return c*c*(3.0 - 2.0*c);
}

float h31(vec3 p){ p = fract(p*0.1031); p += dot(p, p.yzx + 33.33); return fract((p.x + p.y)*p.z); }

vec3 cosmos(vec3 rd, float t){
    vec3 c = mix(vec3(0.006,0.004,0.013), vec3(0.014,0.007,0.026), 0.5+0.5*rd.y);
    float n1 = smoothstep(0.95, -0.1, length(rd.xy - 0.30*vec2(sin(t*0.030), cos(t*0.041))));
    float n2 = smoothstep(1.05, -0.05, length(rd.xz - 0.40*vec2(cos(t*0.025), sin(t*0.034))));
    c += pal(0.10)*n1*0.035 + pal(0.62)*n2*0.028;
    for(int i=0;i<3;i++){
        float sc = 55.0 + 65.0*float(i);
        vec3 gp = rd*sc;
        vec3 id = floor(gp);
        float rnd = h31(id);
        vec3 off = (vec3(h31(id+1.7), h31(id+5.3), h31(id+9.1)) - 0.5)*0.7;
        float dpt = length(fract(gp) - 0.5 - off);
        float star = step(0.80, rnd) * smoothstep(0.09, 0.0, dpt);
        float tw = 0.5 + 0.5*sin(t*3.0 + rnd*40.0);
        c += star * tw * (1.1 - 0.28*float(i));
    }
    return c;
}

vec3 gTrap;

float map(vec3 p){
    float tm = iTime*0.22;

    float breath = 1.0 + 0.025*sin(iTime*0.55);   // slow organic breathing
    p /= breath;

    p.yz *= rot(0.22*sin(iTime*0.09));             // gentle internal life (camera does the orbiting)

    float a = atan(p.z, p.x);
    float r = length(p.xz);
    float seg = TAU/FOLDS;
    a = mod(a + seg*0.5, seg) - seg*0.5;
    a = abs(a);
    p.xz = vec2(cos(a), sin(a))*r;

    vec3  off = vec3(1.00,1.30,0.70) + 0.28*vec3(sin(tm), sin(tm*1.3+1.0), sin(tm*0.7+2.0));
    float fr  = 0.10 + 0.35*sin(tm*0.5);

    vec3 trap = vec3(1e9);
    float scale = 1.0;
    const float S = 2.0;
    for(int i=0;i<NITER;i++){
        p = abs(p);
        if(p.x<p.y) p.xy=p.yx;
        if(p.x<p.z) p.xz=p.zx;
        if(p.y<p.z) p.yz=p.zy;
        p.xy *= rot(fr);
        p = p*S - off*(S-1.0);
        trap = min(trap, abs(p));
        scale *= S;
    }
    gTrap = trap;
    vec3 q = abs(p) - vec3(1.0);
    return (min(max(q.x,max(q.y,q.z)),0.0) + length(max(q,0.0)))/scale*breath;
}

vec3 calcNormal(vec3 p){
    const vec2 k = vec2(1.0, -1.0);
    const float e = 0.0016;
    return normalize(
        k.xyy*map(p + k.xyy*e) +
        k.yyx*map(p + k.yyx*e) +
        k.yxy*map(p + k.yxy*e) +
        k.xxx*map(p + k.xxx*e));
}

float calcAO(vec3 p, vec3 n){
    float ao = 0.0, sca = 1.0;
    for(int i=0;i<4;i++){
        float h = 0.015 + 0.16*float(i)/3.0;
        ao += (h - map(p + n*h))*sca;
        sca *= 0.7;
    }
    return clamp(1.0 - 2.2*ao, 0.0, 1.0);
}

void mainImage(out vec4 fragColor, in vec2 fragCoord){
    vec2 uv = (fragCoord - 0.5*iResolution.xy)/iResolution.y;
    float t = iTime;

    // CAMERA driven by orbit controls: iMouse.x = azimuth, iMouse.y = elevation, iMouse.z = distance.
    float az = iMouse.x;
    float el = iMouse.y;
    float camR = iMouse.z;
    vec3 ro = camR * vec3(cos(el)*sin(az), sin(el), cos(el)*cos(az));

    vec3 fwd = normalize(vec3(0.0)-ro);
    vec3 rgt = normalize(cross(vec3(0,1,0), fwd));
    vec3 up  = cross(fwd, rgt);
    vec3 rd  = normalize(uv.x*rgt + uv.y*up + 1.25*fwd);

    float d=0.0, tt=0.0; bool hit=false; vec3 hp;
    for(int i=0;i<STEPS;i++){
        hp = ro + rd*tt;
        d  = map(hp);
        float eps = 0.0010 + 0.0009*tt;
        if(d<eps){ hit=true; break; }
        tt += d*0.55;
        if(tt>FAR) break;
    }

    vec3 col = cosmos(rd, t);

    if(hit){
        vec3 n   = calcNormal(hp);
        float ao = calcAO(hp, n);
        float fres = pow(1.0 - max(dot(n,-rd),0.0), 2.5);

        vec3 keyDir = normalize(vec3(0.4,0.7,0.5));
        float dif = max(dot(n, keyDir), 0.0);
        float amb = 0.18 + 0.20*n.y;

        float tc  = fract(gTrap.x*0.7 + gTrap.y*0.5 + gTrap.z*0.3 + 0.04*t);
        vec3 base = pal(tc);
        vec3 irid = pal(tc + 0.22 + 0.25*fres);

        col  = base * ao * (0.16*amb + 0.85*dif);
        col += irid * fres * 0.55;

        vec3 spectral = vec3(pow(fres,2.0), pow(fres,2.7), pow(fres,3.6));   // prismatic edge
        col += spectral * vec3(1.0,0.85,0.7) * 0.5;
        col += base * 0.05;
    }

    col = col/(1.0+col);
    col = pow(col, vec3(0.4545));
    col *= 1.0 - 0.45*dot(uv,uv);
    fragColor = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:2rem">WebGL2 not supported in this browser.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime; uniform vec4 iMouse;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }

const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos');
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const uRes = gl.getUniformLocation(prog,'iResolution');
const uTime = gl.getUniformLocation(prog,'iTime');
const uMouse = gl.getUniformLocation(prog,'iMouse');

// ---- orbit controls -------------------------------------------------------
let az = 0.6, el = 0.42, dist = 6.8;     // azimuth, elevation, camera distance
let dragging = false, lastX = 0, lastY = 0, idleSpin = true;
const EL_MIN = -1.30, EL_MAX = 1.30, D_MIN = 3.0, D_MAX = 11.0;
const hint = document.getElementById('hint');

function clamp(v,a,b){ return Math.min(b, Math.max(a, v)); }

canvas.addEventListener('pointerdown', e=>{
  dragging = true; idleSpin = false; lastX = e.clientX; lastY = e.clientY;
  document.body.classList.add('grabbing'); hint.style.opacity = '0';
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e=>{
  if(!dragging) return;
  const dpr = Math.min(devicePixelRatio||1, 2);
  az -= (e.clientX - lastX) * 0.006;
  el = clamp(el + (e.clientY - lastY) * 0.006, EL_MIN, EL_MAX);
  lastX = e.clientX; lastY = e.clientY;
});
function endDrag(){ dragging = false; document.body.classList.remove('grabbing'); }
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  dist = clamp(dist + e.deltaY * 0.004, D_MIN, D_MAX);
  hint.style.opacity = '0';
}, {passive:false});

// touch pinch-to-zoom
let pinchD = 0;
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    if(pinchD) dist = clamp(dist + (pinchD - d) * 0.01, D_MIN, D_MAX);
    pinchD = d;
  }
}, {passive:true});
canvas.addEventListener('touchend', ()=>{ pinchD = 0; });

function resize(){ const dpr=Math.min(devicePixelRatio||1,2);
  canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); }
resize(); addEventListener('resize', resize);

const t0 = performance.now();
function frame(){
  if(idleSpin) az += 0.0016;            // keeps turning until you grab it
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (performance.now()-t0)/1000);
  gl.uniform4f(uMouse, az, el, dist, 0);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
