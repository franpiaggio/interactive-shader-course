<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Fractal — orbit · zoom</title>
<style>
  html,body{margin:0;height:100%;background:#05060a;overflow:hidden;cursor:grab;}
  body.grabbing{cursor:grabbing;}
  canvas{display:block;width:100vw;height:100vh;}
  #err{position:fixed;left:0;top:0;right:0;color:#ff8080;background:#1a0000;
    font:12px/1.5 ui-monospace,monospace;padding:8px 12px;white-space:pre-wrap;display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<pre id="err"></pre>

<script id="frag" type="x-shader/x-fragment">
#define TAU 6.28318530718
#define FOLDS 8.0      // mandala symmetry order
#define NITER 7        // KIFS iterations
#define STEPS 130
#define FAR 30.0

mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }

// Fire / Flesh palette: crimson -> copper -> gold
vec3 pal(float t){
    vec3 c = clamp(vec3(0.55,0.32,0.22) + vec3(0.45,0.30,0.22)*cos(TAU*(vec3(1.0,1.0,0.7)*t + vec3(0.00,0.12,0.22))), 0.0, 1.0);
    return c*c*(3.0 - 2.0*c);
}

float h31(vec3 p){ p = fract(p*0.1031); p += dot(p, p.yzx + 33.33); return fract((p.x + p.y)*p.z); }

vec3 cosmos(vec3 rd, float t){
    vec3 c = mix(vec3(0.006,0.004,0.013), vec3(0.014,0.007,0.026), 0.5+0.5*rd.y);
    float n1 = smoothstep(0.95, -0.1, length(rd.xy - 0.30*vec2(sin(t*0.030), cos(t*0.041))));
    float n2 = smoothstep(1.05, -0.05, length(rd.xz - 0.40*vec2(cos(t*0.025), sin(t*0.034))));
    c += pal(0.10)*n1*0.035 + pal(0.62)*n2*0.028;
    for(int i=0;i<3;i++){
        float sc = 55.0 + 65.0*float(i);
        vec3 gp = rd*sc;
        vec3 id = floor(gp);
        float rnd = h31(id);
        vec3 off = (vec3(h31(id+1.7), h31(id+5.3), h31(id+9.1)) - 0.5)*0.7;
        float dpt = length(fract(gp) - 0.5 - off);
        float star = step(0.80, rnd) * smoothstep(0.09, 0.0, dpt);
        float tw = 0.5 + 0.5*sin(t*3.0 + rnd*40.0);
        c += star * tw * (1.1 - 0.28*float(i));
    }
    return c;
}

vec3 gTrap;

float map(vec3 p){
    float tm = iTime*0.22;                    // morph clock

    p.xz *= rot(iTime*0.16);                   // the form spins on its axis
    p.yz *= rot(0.22*sin(iTime*0.09));         // gentle tumble

    float a = atan(p.z, p.x);                  // mandala symmetry around the vertical axis
    float r = length(p.xz);
    float seg = TAU/FOLDS;
    a = mod(a + seg*0.5, seg) - seg*0.5;
    a = abs(a);
    p.xz = vec2(cos(a), sin(a))*r;

    vec3  off = vec3(1.00,1.30,0.70) + 0.28*vec3(sin(tm), sin(tm*1.3+1.0), sin(tm*0.7+2.0));
    float fr  = 0.10 + 0.35*sin(tm*0.5);

    vec3 trap = vec3(1e9);
    float scale = 1.0;
    const float S = 2.0;
    for(int i=0;i<NITER;i++){                  // morphing octahedral KIFS
        p = abs(p);
        if(p.x<p.y) p.xy=p.yx;
        if(p.x<p.z) p.xz=p.zx;
        if(p.y<p.z) p.yz=p.zy;
        p.xy *= rot(fr);
        p = p*S - off*(S-1.0);
        trap = min(trap, abs(p));
        scale *= S;
    }
    gTrap = trap;
    vec3 q = abs(p) - vec3(1.0);
    return (min(max(q.x,max(q.y,q.z)),0.0) + length(max(q,0.0)))/scale;
}

vec3 calcNormal(vec3 p){
    const vec2 k = vec2(1.0, -1.0);
    const float e = 0.0016;
    return normalize(
        k.xyy*map(p + k.xyy*e) +
        k.yyx*map(p + k.yyx*e) +
        k.yxy*map(p + k.yxy*e) +
        k.xxx*map(p + k.xxx*e));
}

float calcAO(vec3 p, vec3 n){
    float ao = 0.0, sca = 1.0;
    for(int i=0;i<4;i++){
        float h = 0.015 + 0.16*float(i)/3.0;
        ao += (h - map(p + n*h))*sca;
        sca *= 0.7;
    }
    return clamp(1.0 - 2.2*ao, 0.0, 1.0);
}

void mainImage(out vec4 fragColor, in vec2 fragCoord){
    vec2 uv = (fragCoord - 0.5*iResolution.xy)/iResolution.y;
    float t = iTime;

    // OrbitControls-style camera: uYaw/uPitch accumulate in JS (drag flings, coasts,
    // idle auto-spin); uDist is the scroll/pinch zoom distance.
    float az = uYaw;
    float el = uPitch;
    float camR = uDist;
    vec3 ro = camR * vec3(cos(el)*sin(az), sin(el), cos(el)*cos(az));

    vec3 fwd = normalize(vec3(0.0)-ro);
    vec3 rgt = normalize(cross(vec3(0,1,0), fwd));
    vec3 up  = cross(fwd, rgt);
    vec3 rd  = normalize(uv.x*rgt + uv.y*up + 1.25*fwd);

    float d=0.0, tt=0.0; bool hit=false; vec3 hp;
    for(int i=0;i<STEPS;i++){
        hp = ro + rd*tt;
        d  = map(hp);
        float eps = 0.0010 + 0.0009*tt;
        if(d<eps){ hit=true; break; }
        tt += d*0.55;
        if(tt>FAR) break;
    }

    vec3 col = cosmos(rd, t);

    if(hit){
        vec3 n   = calcNormal(hp);
        float ao = calcAO(hp, n);
        float fres = pow(1.0 - max(dot(n,-rd),0.0), 2.5);

        vec3 keyDir = normalize(vec3(0.4,0.7,0.5));
        float dif = max(dot(n, keyDir), 0.0);
        float amb = 0.18 + 0.20*n.y;

        float tc  = fract(gTrap.x*0.7 + gTrap.y*0.5 + gTrap.z*0.3 + 0.04*t);
        vec3 base = pal(tc);
        vec3 irid = pal(tc + 0.22 + 0.25*fres);

        col  = base * ao * (0.16*amb + 0.85*dif);
        col += irid * fres * 0.60;
        col += vec3(1.0,0.97,0.9) * pow(fres,5.0) * 0.18;
        col += base * 0.05;
    }

    col = col/(1.0+col);
    col = pow(col, vec3(0.4545));
    col *= 1.0 - 0.45*dot(uv,uv);
    fragColor = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');
const errBox = document.getElementById('err');
function showErr(msg){ errBox.style.display='block'; errBox.textContent = msg; }

const VERT = `#version 300 es
in vec2 p; void main(){ gl_Position = vec4(p,0.0,1.0); }`;
const FRAG_HEADER = `#version 300 es
precision highp float;
uniform vec3  iResolution;
uniform float iTime;
uniform float uYaw;
uniform float uPitch;
uniform float uDist;
out vec4 outColor;
`;
const FRAG_FOOTER = `
void main(){ mainImage(outColor, gl_FragCoord.xy); }`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){ showErr('Shader error:\n' + gl.getShaderInfoLog(s)); return null; }
  return s;
}

const fragSrc = FRAG_HEADER + document.getElementById('frag').textContent + FRAG_FOOTER;
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
gl.bindAttribLocation(prog, 0, 'p');
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const uRes   = gl.getUniformLocation(prog, 'iResolution');
const uTime  = gl.getUniformLocation(prog, 'iTime');
const uYaw   = gl.getUniformLocation(prog, 'uYaw');
const uPitch = gl.getUniformLocation(prog, 'uPitch');
const uDist  = gl.getUniformLocation(prog, 'uDist');

// ---- OrbitControls-style camera: drag to spin, release to coast (inertia),
//      slow auto-spin when idle, scroll / pinch to zoom. ----
let yaw = 0.6, pitch = 0.42;     // accumulated orbit angles
let vYaw = 0.0, vPitch = 0.0;    // angular velocities (coast)
let dist = 6.8;                  // camera distance (zoom)
let dragging = false, lastX = 0, lastY = 0;
const SENS = 0.006, DAMP = 0.93, AUTO = 0.0018, PITCH_LIMIT = 1.45;
const D_MIN = 3.2, D_MAX = 12.0;

function clamp(v,a,b){ return Math.min(b, Math.max(a, v)); }

canvas.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  vYaw = 0; vPitch = 0;
  document.body.classList.add('grabbing');
  canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  vYaw = -dx * SENS; vPitch = dy * SENS;
  yaw += vYaw; pitch += vPitch;
  pitch = clamp(pitch, -PITCH_LIMIT, PITCH_LIMIT);
});
function endDrag(){ dragging = false; document.body.classList.remove('grabbing'); }
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);
canvas.addEventListener('pointerleave', endDrag);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  dist = clamp(dist + e.deltaY * 0.004, D_MIN, D_MAX);
}, {passive:false});

// touch pinch-to-zoom
let pinchD = 0;
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    if (pinchD) dist = clamp(dist + (pinchD - d) * 0.01, D_MIN, D_MAX);
    pinchD = d;
  }
}, {passive:true});
canvas.addEventListener('touchend', () => { pinchD = 0; });

const QUALITY = 1.5;
function resize(){
  const dpr = Math.min(devicePixelRatio || 1, QUALITY);
  const w = Math.max(2, innerWidth  * dpr | 0);
  const h = Math.max(2, innerHeight * dpr | 0);
  canvas.width = w; canvas.height = h;
  gl.viewport(0, 0, w, h);
}
resize();
addEventListener('resize', resize);

const t0 = performance.now();
(function loop(){
  if (!dragging) {
    yaw += vYaw; pitch += vPitch;
    vYaw *= DAMP; vPitch *= DAMP;
    pitch = clamp(pitch, -PITCH_LIMIT, PITCH_LIMIT);
  }
  yaw += AUTO;
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (performance.now() - t0) / 1000);
  gl.uniform1f(uYaw, yaw);
  gl.uniform1f(uPitch, pitch);
  gl.uniform1f(uDist, dist);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
