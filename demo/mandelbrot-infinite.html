<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Infinite Mandelbrot Zoom</title>
<style>
  :root{ --accent:#6fb7ff; }
  html,body{margin:0;height:100%;background:radial-gradient(circle at 50% 30%, #101625, #05070d 70%);overflow:hidden;
    font-family:Helvetica,Arial,sans-serif;color:#eaf0ff;}
  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;box-sizing:border-box;}
  .title{font-size:34px;font-weight:800;letter-spacing:-0.01em;text-align:center;text-shadow:0 2px 20px rgba(0,0,0,.6);}
  .title small{display:block;margin-top:6px;font:600 13px/1.4 ui-monospace,"SF Mono",Menlo,monospace;
    letter-spacing:.14em;color:#9fb4cc;text-transform:uppercase;}
  .stage{position:relative;width:min(860px,92vw);aspect-ratio:16/9;border-radius:16px;overflow:hidden;
    box-shadow:0 24px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06) inset;background:#000;}
  canvas{display:block;width:100%;height:100%;}
  .bar{display:flex;align-items:center;gap:14px;padding:10px 16px;border-radius:999px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);}
  .btn{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,0.12);color:#eaf0ff;
    font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .btn:hover{background:rgba(255,255,255,0.24);}
  input[type=range]{-webkit-appearance:none;appearance:none;width:150px;height:4px;border-radius:4px;
    background:rgba(255,255,255,0.22);outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:var(--accent);cursor:pointer;}
  .credit{position:fixed;right:20px;bottom:16px;font:600 12px/1.3 ui-monospace,monospace;}
  .credit a{color:#ffd9a0;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Mandelbrot 2D Zoom</div>
  <div class="stage"><canvas id="c"></canvas></div>
  <div class="bar">
    <button class="btn" id="slow" title="back">«</button>
    <button class="btn" id="play" title="play / pause">⏸</button>
    <button class="btn" id="fast" title="deeper">»</button>
    <input id="spd" type="range" min="-100" max="100" value="34" title="speed (left = back, right = deeper)">
  </div>
</div>

<script id="frag" type="x-shader/fragment">
// Perturbation theory with REBASING (Zhuoran's method): one high-precision reference orbit
// X_n (JS double, in a float texture) + a small per-pixel delta dz in float. Rebasing keeps
// it glitch-free and lets the true iteration count exceed the stored reference length.
#define MAXI 2600

vec3 pal(float t){ return 0.5 + 0.5*cos(6.28318530718*(t + vec3(0.0,0.33,0.62))); }
vec2 cmul(vec2 a, vec2 b){ return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }

vec3 mb(vec2 dc){
    int refLen = int(uRefLen + 0.5);
    vec2 dz = vec2(0.0);
    vec2 X = vec2(0.0);           // X[0] = 0 (kept in a var: only ONE texture read per step)
    int n = 0;
    float iter = 0.0, r2 = 0.0; bool esc = false;
    for(int i=0;i<MAXI;i++){
        dz = cmul(2.0*X, dz) + cmul(dz, dz) + dc;
        n++; iter += 1.0;
        X = texelFetch(uRef, ivec2(n, 0), 0).rg;
        vec2 z = X + dz;
        r2 = dot(z, z);
        if(r2 > 256.0){ esc = true; break; }
        if(r2 < dot(dz, dz) || n >= refLen-1){ dz = z; n = 0; X = vec2(0.0); }
    }
    if(!esc) return vec3(0.015, 0.015, 0.03);
    float sn = iter - log2(log2(r2)) + 4.0;
    return pal(sn*0.03 + 0.55);
}

void mainImage(out vec4 o, in vec2 fc){
    vec2 uv = (fc - 0.5*iResolution.xy)/iResolution.y;
    vec3 col = mb(uv*uScale);
    col = pow(col, vec3(0.4545));
    col *= 1.0 - 0.20*dot(uv, uv);
    o = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('c');
const stage = canvas.parentElement;
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;padding:2rem">WebGL2 not supported.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime;
uniform sampler2D uRef; uniform float uRefLen; uniform float uScale;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }

const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos');
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const b = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, b);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'iResolution'), uTime=gl.getUniformLocation(prog,'iTime');
const uRef=gl.getUniformLocation(prog,'uRef'), uRefLn=gl.getUniformLocation(prog,'uRefLen'), uScale=gl.getUniformLocation(prog,'uScale');

const REFN = 2048;
const refTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, refTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

// ---- double-double arithmetic (two doubles ~= 32 digits) so the reference orbit is
//      accurate FAR past plain double (~15 digits). The reference is stored as single float
//      (it's O(1), the delta is relative), but computing it precisely is what unlocks depth. ----
const DDSPLIT = 134217729;   // 2^27 + 1
function twoSum(a,b){ const s=a+b, bb=s-a; return [s, (a-(s-bb))+(b-bb)]; }
function twoProd(a,b){ const p=a*b;
  const ca=DDSPLIT*a, ah=ca-(ca-a), al=a-ah;
  const cb=DDSPLIT*b, bh=cb-(cb-b), bl=b-bh;
  return [p, ((ah*bh-p)+ah*bl+al*bh)+al*bl]; }
function ddAdd(a,b){ let [s,e]=twoSum(a[0],b[0]); e+=a[1]+b[1]; return twoSum(s,e); }
function ddSub(a,b){ return ddAdd(a,[-b[0],-b[1]]); }
function ddMul(a,b){ let [p,e]=twoProd(a[0],b[0]); e+=a[0]*b[1]+a[1]*b[0]; return twoSum(p,e); }

// deep seahorse-valley point, in double-double (hi + lo), from its 33-digit coordinates
const CX = [-0.7436438870371587, -3.628952515063387e-17];
const CY = [ 0.13182590420531198, -1.2892807754956675e-17];
let refLen = REFN;
(function computeRef(){
  const data = new Float32Array(REFN*4);
  let Zx=[0,0], Zy=[0,0], len=REFN;
  for(let i=0;i<REFN;i++){
    data[i*4]=Zx[0]; data[i*4+1]=Zy[0];         // store hi as single float
    const Zx2=ddMul(Zx,Zx), Zy2=ddMul(Zy,Zy);
    const nZx=ddAdd(ddSub(Zx2,Zy2), CX);
    const t=ddMul(Zx,Zy); const nZy=ddAdd(ddAdd(t,t), CY);  // 2*Zx*Zy + CY
    Zx=nZx; Zy=nZy;
    if(Zx[0]*Zx[0]+Zy[0]*Zy[0] > 1e8){ len=i+1; break; }
  }
  gl.bindTexture(gl.TEXTURE_2D, refTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, REFN, 1, 0, gl.RGBA, gl.FLOAT, data);
  refLen = len;
})();

const ZMIN = 0.0, ZMAX = 16.0;   // double-double reference; MAXI resolves the exterior here
let zoom = 0.0, paused = false;
let speedUI = 0.34;
function curSpeed(){ return speedUI * 0.75; }

const playBtn = document.getElementById('play'), spd = document.getElementById('spd');
document.getElementById('slow').onclick = () => { spd.value=Math.max(-100,+spd.value-15); speedUI=spd.value/100; };
document.getElementById('fast').onclick = () => { spd.value=Math.min( 100,+spd.value+15); speedUI=spd.value/100; };
spd.addEventListener('input', e => { speedUI = e.target.value/100; });
playBtn.onclick = () => { paused = !paused; playBtn.textContent = paused ? '▶' : '⏸'; };

// small window -> few pixels -> smooth even with the heavy per-pixel orbit. Render crisp (dpr up to 2).
function resize(){ const dpr=Math.min(devicePixelRatio||1, 1.2);
  canvas.width = Math.max(2, Math.floor(stage.clientWidth*dpr));
  canvas.height = Math.max(2, Math.floor(stage.clientHeight*dpr)); }
resize(); addEventListener('resize', resize);

const t0 = performance.now(); let last = t0;
function frame(now){
  const dt = Math.min((now-last)/1000, 0.05); last = now;
  if(!paused){
    zoom += curSpeed()*dt;
    if(zoom > ZMAX) zoom = ZMAX;
    if(zoom < ZMIN) zoom = ZMIN;
  }
  const scale = 1.5 * Math.pow(0.16, zoom);
  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, refTex);
  gl.uniform1i(uRef, 0);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (now-t0)/1000);
  gl.uniform1f(uRefLn, refLen);
  gl.uniform1f(uScale, scale);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
