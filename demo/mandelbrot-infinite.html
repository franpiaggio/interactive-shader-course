<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mandelbrot — deep zoom (perturbation)</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  canvas{display:block;width:100vw;height:100vh;}
  .bar{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);display:flex;align-items:center;gap:14px;
       padding:10px 16px;border-radius:999px;background:rgba(12,16,24,0.55);backdrop-filter:blur(8px);
       border:1px solid rgba(255,255,255,0.10);box-shadow:0 6px 24px rgba(0,0,0,0.4);opacity:.35;transition:opacity .25s;}
  .bar:hover{opacity:1;}
  .btn{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,0.12);color:#eaf0ff;
       font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .btn:hover{background:rgba(255,255,255,0.24);}
  input[type=range]{-webkit-appearance:none;appearance:none;width:150px;height:4px;border-radius:4px;
       background:rgba(255,255,255,0.22);outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#6fb7ff;cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:#6fb7ff;cursor:pointer;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="bar">
  <button class="btn" id="slow" title="back">«</button>
  <button class="btn" id="play" title="play / pause">⏸</button>
  <button class="btn" id="fast" title="deeper">»</button>
  <input id="spd" type="range" min="-100" max="100" value="34" title="speed (left = back, right = deeper)">
</div>

<script id="frag" type="x-shader/fragment">
// Perturbation theory with REBASING (Zhuoran's method): one high-precision reference orbit
// X_n (JS double, in a float texture) + a small per-pixel delta dz in float. Rebasing keeps
// it glitch-free and lets the true iteration count exceed the stored reference length, so a
// short reference drives arbitrarily many iterations. This reaches magnifications the plain
// float shader (which grains out ~x50) cannot.
#define MAXI 1150

vec3 pal(float t){ return 0.5 + 0.5*cos(6.28318530718*(t + vec3(0.0,0.33,0.62))); }
vec2 cmul(vec2 a, vec2 b){ return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }

vec3 mb(vec2 dc){
    int refLen = int(uRefLen + 0.5);
    vec2 dz = vec2(0.0);
    vec2 X = vec2(0.0);           // X[0] = 0 (kept in a var: only ONE texture read per step)
    int n = 0;                    // reference index
    float iter = 0.0;             // true iteration count (for coloring)
    float r2 = 0.0; bool esc = false;
    for(int i=0;i<MAXI;i++){
        dz = cmul(2.0*X, dz) + cmul(dz, dz) + dc;      // advance the delta (uses X = X[n])
        n++; iter += 1.0;
        X = texelFetch(uRef, ivec2(n, 0), 0).rg;       // one read: X[n]
        vec2 z = X + dz;                               // the true orbit point
        r2 = dot(z, z);
        if(r2 > 256.0){ esc = true; break; }
        if(r2 < dot(dz, dz) || n >= refLen-1){ dz = z; n = 0; X = vec2(0.0); }  // rebase (X[0]=0)
    }
    if(!esc) return vec3(0.015, 0.015, 0.03);
    float sn = iter - log2(log2(r2)) + 4.0;
    return pal(sn*0.03 + 0.55);
}

void mainImage(out vec4 o, in vec2 fc){
    vec2 uv = (fc - 0.5*iResolution.xy)/iResolution.y;
    vec2 dc = uv*uScale;                               // offset from the reference center
    vec3 col = mb(dc);
    col = pow(col, vec3(0.4545));                      // gamma -> vivid
    col *= 1.0 - 0.26*dot(uv, uv);                     // vignette
    o = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:2rem">WebGL2 not supported.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime;
uniform sampler2D uRef; uniform float uRefLen; uniform float uScale;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }

const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos');
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const b = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, b);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'iResolution'), uTime=gl.getUniformLocation(prog,'iTime');
const uRef=gl.getUniformLocation(prog,'uRef'), uRefLn=gl.getUniformLocation(prog,'uRefLen'), uScale=gl.getUniformLocation(prog,'uScale');

// reference orbit (JS double precision) -> float texture
const REFN = 2048;
const refTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, refTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

// a deep, high-precision seahorse-valley point (17 digits -> good to the JS double limit)
const CX = -0.7436438870371587, CY = 0.13182590420531197;
let refLen = REFN;
(function computeRef(){
  const data = new Float32Array(REFN*4);
  let zx=0, zy=0, len=REFN;
  for(let i=0;i<REFN;i++){
    data[i*4]=zx; data[i*4+1]=zy;
    const nx=zx*zx-zy*zy+CX, ny=2*zx*zy+CY; zx=nx; zy=ny;
    if(zx*zx+zy*zy>1e8){ len=i+1; break; }
  }
  gl.bindTexture(gl.TEXTURE_2D, refTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, REFN, 1, 0, gl.RGBA, gl.FLOAT, data);
  refLen = len;
})();

// ---- continuous straight zoom; stop at the double-precision limit --------
const ZMIN = 0.0, ZMAX = 13.0;   // ~10^10 magnification (JS double reference limit)
let zoom = 0.0, paused = false;
let speedUI = 0.34;              // -1..1 : positive = deeper, negative = back out
function curSpeed(){ return speedUI * 0.75; }

const playBtn = document.getElementById('play'), spd = document.getElementById('spd');
document.getElementById('slow').onclick = () => { spd.value=Math.max(-100,+spd.value-15); speedUI=spd.value/100; };
document.getElementById('fast').onclick = () => { spd.value=Math.min( 100,+spd.value+15); speedUI=spd.value/100; };
spd.addEventListener('input', e => { speedUI = e.target.value/100; });
playBtn.onclick = () => { paused = !paused; playBtn.textContent = paused ? '▶' : '⏸'; };

function resize(){ const dpr=Math.min(devicePixelRatio||1, 0.85);
  canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); }
resize(); addEventListener('resize', resize);

const t0 = performance.now(); let last = t0;
function frame(now){
  const dt = Math.min((now-last)/1000, 0.05); last = now;
  if(!paused){
    zoom += curSpeed()*dt;
    if(zoom > ZMAX) zoom = ZMAX;      // reached the limit -> stop (slide left to go back)
    if(zoom < ZMIN) zoom = ZMIN;
  }
  const scale = 1.5 * Math.pow(0.16, zoom);

  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, refTex);
  gl.uniform1i(uRef, 0);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (now-t0)/1000);
  gl.uniform1f(uRefLn, refLen);
  gl.uniform1f(uScale, scale);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
