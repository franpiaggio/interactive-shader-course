<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Julia — move to morph</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;cursor:none;}
  canvas{display:block;width:100vw;height:100vh;}
  /* the aiming dot marks the c value (mouse position on the plane) */
  #ring{position:fixed;left:0;top:0;width:14px;height:14px;border:2px solid rgba(255,255,255,.9);
    border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;mix-blend-mode:difference;
    box-shadow:0 0 12px rgba(0,0,0,.6);transition:opacity .3s;}
  .hud{position:fixed;left:22px;top:18px;color:#eee;font:600 14px/1.5 ui-monospace,"SF Mono",Menlo,monospace;
    letter-spacing:.03em;text-shadow:0 2px 8px #000;pointer-events:none;}
  .hud .tag{background:#c79bff;color:#160b26;padding:4px 10px;border-radius:7px;}
  .hud small{display:block;margin-top:6px;color:#b9c2d6;font-weight:500;}
  .hint{position:fixed;left:0;right:0;bottom:26px;text-align:center;color:#cfd4e2;
    font:500 16px/1.4 Helvetica,Arial,sans-serif;text-shadow:0 2px 10px #000;pointer-events:none;transition:opacity .8s;}
  .credit{position:fixed;right:22px;bottom:18px;font:600 12px/1.3 ui-monospace,monospace;}
  .credit a{color:#e6c6ff;text-decoration:none;pointer-events:auto;text-shadow:0 2px 8px #000;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ring"></div>
<div class="hud"><span class="tag">z → z² + c</span> &nbsp;Julia set<small id="cval">c = auto</small></div>
<div class="hint" id="hint">move the mouse to reshape · it becomes the constant c · scroll to zoom · double-click to reset · leave it to auto-wander</div>
<div class="credit"><a href="https://franpiaggio.github.io/interactive-shader-course/" target="_blank">learn how → interactive-shader-course</a></div>

<script id="frag" type="x-shader/fragment">
#define ITER 320
vec3 pal(float t){ return 0.5 + 0.5*cos(6.28318530718*(t + vec3(0.0,0.33,0.62))); }
vec2 cmul(vec2 a, vec2 b){ return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }

vec3 julia(vec2 z, vec2 c){
  float n = 0.0, r2 = 0.0;
  for(int i=0;i<ITER;i++){ z = cmul(z,z) + c; r2 = dot(z,z); if(r2>256.0) break; n += 1.0; }
  if(r2 <= 256.0){
    // interior: soft glow instead of flat black, tinted by how close to escaping
    float g = 0.5 + 0.5*sin(dot(z,z)*3.0);
    return mix(vec3(0.02,0.01,0.05), vec3(0.10,0.03,0.16), g);
  }
  float sn = n - log2(log2(r2)) + 4.0;
  return pal(sn*0.028 + uHue);
}
void mainImage(out vec4 o, in vec2 fc){
  vec2 uv = (fc - 0.5*iResolution.xy)/iResolution.y;
  vec3 col = julia(uv*uScale + vec2(uPx, uPy), vec2(uCx, uCy));
  col = pow(col, vec3(0.4545));
  vec2 uvc = (fc - 0.5*iResolution.xy)/iResolution.y;
  col *= 1.0 - 0.22*dot(uvc, uvc);      // vignette
  o = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:2rem">WebGL2 not supported.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime;
uniform float uScale, uPx, uPy, uCx, uCy, uHue;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;
function sh(t,s){ const x=gl.createShader(t); gl.shaderSource(x,s); gl.compileShader(x);
  if(!gl.getShaderParameter(x,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(x)); return x; }
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos'); gl.linkProgram(prog); gl.useProgram(prog);
const b=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,b);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
const U = n => gl.getUniformLocation(prog,n);
const uRes=U('iResolution'), uTime=U('iTime'), uScale=U('uScale'),
      uPx=U('uPx'), uPy=U('uPy'), uCx=U('uCx'), uCy=U('uCy'), uHue=U('uHue');

// ---- state ----------------------------------------------------------------
let px = 0.0, py = 0.0, scale = 2.6;          // view center + span (Julia is centered on origin)
const S_MIN = 2.6*Math.pow(0.2, 6.0), S_MAX = 3.4;
let cx = -0.4, cy = 0.6;                       // the Julia constant
let overriding = false, idleAt = 0;            // mouse controls c; falls back to auto-wander when idle
let mCX = innerWidth/2, mCY = innerHeight/2;
const ring = document.getElementById('ring'), hint = document.getElementById('hint'), cval = document.getElementById('cval');

function dpr(){ return Math.min(devicePixelRatio||1, 1.5); }
// mouse pixel -> complex c. Julias are richest near the Mandelbrot boundary (|c|~0.8),
// so we map the screen to a window slightly bigger than the unit disk.
function mouseToC(){
  const rx = (mCX/innerWidth  - 0.5) * 3.2;
  const ry = (0.5 - mCY/innerHeight) * 3.2 * (innerHeight/innerWidth);
  return [ rx, ry ];
}

canvas.addEventListener('pointermove', e => {
  mCX = e.clientX; mCY = e.clientY; overriding = true; idleAt = 0;
  ring.style.left = e.clientX+'px'; ring.style.top = e.clientY+'px'; ring.style.opacity = '1';
  hint.style.opacity = '0';
});
canvas.addEventListener('pointerleave', () => { overriding = false; idleAt = performance.now(); ring.style.opacity='0'; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  scale = Math.min(S_MAX, Math.max(S_MIN, scale * (e.deltaY > 0 ? 1.1 : 0.9)));
}, {passive:false});
addEventListener('dblclick', () => { px=0; py=0; scale=2.6; });

function resize(){ const d=dpr(); canvas.width=Math.floor(innerWidth*d); canvas.height=Math.floor(innerHeight*d); }
resize(); addEventListener('resize', resize);

const t0 = performance.now();
function frame(now){
  const t = (now - t0)/1000;
  // target c: mouse when hovering, otherwise a slow wander around the boundary necklace
  let tx, ty;
  if(overriding){ [tx, ty] = mouseToC(); }
  else {
    const a = t*0.15;                                   // lazy sweep of the boundary
    const r = 0.7885 + 0.02*Math.sin(t*0.5);            // classic |c| that stays interesting
    tx = r*Math.cos(a); ty = r*Math.sin(a);
  }
  // ease toward the target so morphs feel liquid, never snap
  cx += (tx - cx) * 0.08; cy += (ty - cy) * 0.08;
  const hue = 0.55 + 0.12*Math.sin(t*0.2);

  cval.textContent = 'c = ' + cx.toFixed(3) + (cy>=0?' + ':' − ') + Math.abs(cy).toFixed(3) + 'i';

  gl.useProgram(prog);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uScale, scale); gl.uniform1f(uPx, px); gl.uniform1f(uPy, py);
  gl.uniform1f(uCx, cx); gl.uniform1f(uCy, cy); gl.uniform1f(uHue, hue);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
