<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Metaballs — a fragment shader you can touch</title>
<style>
  html,body{margin:0;height:100%;background:#07080d;overflow:hidden;cursor:crosshair;}
  canvas{display:block;width:100vw;height:100vh;}
  .hud{position:fixed;left:24px;top:20px;color:#eee;font:600 14px/1.4 ui-monospace,"SF Mono",Menlo,monospace;
       letter-spacing:.04em;text-shadow:0 2px 8px #000;pointer-events:none;}
  .hud .tag{background:#e6885f;color:#1a1208;padding:4px 10px;border-radius:7px;}
  .hint{position:fixed;left:0;right:0;bottom:30px;text-align:center;color:#cfd4e2;
        font:500 18px/1.4 Helvetica,Arial,sans-serif;text-shadow:0 2px 10px #000;
        pointer-events:none;transition:opacity .8s;}
  .credit{position:fixed;right:24px;bottom:22px;font:600 13px/1.3 ui-monospace,monospace;}
  .credit a{color:#ffd9a0;text-decoration:none;pointer-events:auto;text-shadow:0 2px 8px #000;}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="hud"><span class="tag">ONE FRAGMENT SHADER</span> &nbsp;metaballs · move your mouse</div>
<div class="hint" id="hint">move your mouse / drag — one blob follows you, merging with the rest</div>
<div class="credit"><a href="https://franpiaggio.github.io/interactive-shader-course/" target="_blank">learn how → interactive-shader-course</a></div>

<script id="frag" type="x-shader/fragment">
vec3 palette(float t){ return 0.5+0.5*cos(6.28318*(t+vec3(0.0,0.33,0.67))); }
float smin(float a,float b,float k){ float h=clamp(0.5+0.5*(b-a)/k,0.0,1.0); return mix(b,a,h)-k*h*(1.0-h); }
float hash(vec3 p){ p=fract(p*0.3183099+0.1); p*=17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }
float noise(vec3 x){ vec3 i=floor(x),f=fract(x); f=f*f*(3.0-2.0*f);
  return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
             mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z); }
float fbm(vec3 p){ float v=0.0,a=0.5; for(int i=0;i<4;i++){ v+=a*noise(p); p*=2.02; a*=0.5; } return v; }

float map(vec3 p){
  float asp = iResolution.x/iResolution.y;
  vec2 m = (iMouse.xy/iResolution.xy)*2.0 - 1.0;     // -1..1
  vec3 mpos = vec3(m.x*1.7*asp, m.y*1.7, 0.0);       // the mouse-controlled blob
  float k=0.32, d=1e9;
  for(int i=0;i<4;i++){ float fi=float(i);
    vec3 c=vec3(1.0*sin(iTime*0.7+fi*1.7), 0.85*cos(iTime*0.6+fi*2.1), 0.6*sin(iTime*0.5+fi*1.1));
    float s=length(p-c)-0.5;
    d=(i==0)?s:smin(d,s,k);
  }
  d = smin(d, length(p-mpos)-0.6, k);                // your blob, merging with the rest
  d -= 0.07*(fbm(p*1.8 + iTime*0.3) - 0.5);          // noise warps the surface
  return d;
}
float march(vec3 ro,vec3 rd){ float t=0.0; for(int i=0;i<140;i++){ float d=map(ro+rd*t); if(d<0.001) return t; if(t>40.0) break; t+=d*0.6; } return -1.0; }
vec3 nrm(vec3 p){ vec2 e=vec2(1.,-1.)*0.5773*0.0015; return normalize(e.xyy*map(p+e.xyy)+e.yyx*map(p+e.yyx)+e.yxy*map(p+e.yxy)+e.xxx*map(p+e.xxx)); }

void mainImage(out vec4 fragColor, in vec2 fragCoord){
  vec2 uv=(fragCoord-0.5*iResolution.xy)/iResolution.y;
  vec3 ro=vec3(0.0,0.0,6.0);
  vec3 rd=normalize(vec3(uv,-1.7));
  vec3 bg=mix(vec3(0.02,0.03,0.06), vec3(0.07,0.03,0.13), uv.y+0.5);
  vec3 col=bg;
  float t=march(ro,rd);
  if(t>0.0){
    vec3 p=ro+rd*t; vec3 n=nrm(p); vec3 V=-rd;
    vec3 L1=normalize(vec3(sin(iTime*0.7), 0.7, cos(iTime*0.7)));
    vec3 L2=normalize(vec3(cos(iTime*0.5+2.0), -0.35, sin(iTime*0.5+2.0)));
    vec3 c1=0.55+0.45*cos(iTime*0.6+vec3(0.0,2.0,4.0));
    vec3 c2=0.55+0.45*cos(iTime*0.55+vec3(4.0,1.0,2.0));
    float d1=max(dot(n,L1),0.0), d2=max(dot(n,L2),0.0);
    float s1=pow(max(dot(n,normalize(L1+V)),0.0),60.0);
    float s2=pow(max(dot(n,normalize(L2+V)),0.0),60.0);
    float fres=pow(1.0-max(dot(n,V),0.0),3.0);
    vec3 albedo=palette(0.1+0.15*p.y+0.08*length(p));
    col = albedo*0.12 + albedo*(d1*c1*1.1 + d2*c2*0.8) + (s1*c1+s2*c2)*1.5 + fres*mix(c1,c2,0.5)*0.7;
    col=mix(col,bg,1.0-exp(-t*0.04));
  }
  col *= 1.0 - 0.22*dot(uv,uv);
  col=pow(col,vec3(0.4545));
  fragColor=vec4(col,1.0);
}
</script>

<script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:2rem">WebGL2 not supported in this browser.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime; uniform vec4 iMouse;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }

const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos');
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const uRes = gl.getUniformLocation(prog,'iResolution');
const uTime = gl.getUniformLocation(prog,'iTime');
const uMouse = gl.getUniformLocation(prog,'iMouse');

let mx = innerWidth/2, my = innerHeight/2, moved = false;
const hint = document.getElementById('hint');
function setMouse(x,y){ const dpr=Math.min(devicePixelRatio||1,2); mx=x*dpr; my=(innerHeight-y)*dpr;
  if(!moved){ moved=true; hint.style.opacity='0'; } }
addEventListener('pointermove', e=>setMouse(e.clientX, e.clientY));
addEventListener('touchmove', e=>{ if(e.touches[0]) setMouse(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});

function resize(){ const dpr=Math.min(devicePixelRatio||1,2);
  canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); }
resize(); addEventListener('resize', resize);
mx = canvas.width/2; my = canvas.height/2;

const t0 = performance.now();
function frame(){
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (performance.now()-t0)/1000);
  gl.uniform4f(uMouse, mx, my, 0, 0);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
