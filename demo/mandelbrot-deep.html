<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mandelbrot — deep zoom</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  canvas{display:block;width:100vw;height:100vh;}
  /* control bar */
  .bar{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);display:flex;align-items:center;gap:14px;
       padding:10px 16px;border-radius:999px;background:rgba(12,16,24,0.55);backdrop-filter:blur(8px);
       border:1px solid rgba(255,255,255,0.10);box-shadow:0 6px 24px rgba(0,0,0,0.4);
       opacity:.35;transition:opacity .25s;}
  .bar:hover{opacity:1;}
  .btn{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,0.12);color:#eaf0ff;
       font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .btn:hover{background:rgba(255,255,255,0.24);}
  input[type=range]{-webkit-appearance:none;appearance:none;width:150px;height:4px;border-radius:4px;
       background:rgba(255,255,255,0.22);outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#6fb7ff;cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:#6fb7ff;cursor:pointer;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="bar">
  <button class="btn" id="slow" title="slower">«</button>
  <button class="btn" id="play" title="play / pause">⏸</button>
  <button class="btn" id="fast" title="faster">»</button>
  <input id="spd" type="range" min="0" max="100" value="38" title="speed">
</div>

<script id="frag" type="x-shader/fragment">
// Perturbation: a high-precision reference orbit Z_n (computed in JS double, in a float
// texture) lets each pixel iterate only a tiny delta -> crisp far past plain-float limits.
#define NMAX 700
#define AA 2

vec3 pal(float t){ return 0.5 + 0.5*cos(6.28318530718*(t + vec3(0.0,0.33,0.62))); }
vec2 cmul(vec2 a, vec2 b){ return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }

vec3 mbSample(vec2 uv){
    vec2 dc = uv*uScale;
    int refLen = int(uRefLen + 0.5);
    vec2 d = vec2(0.0);
    float n = 0.0, r2 = 0.0; bool esc = false;
    for(int i=0;i<NMAX;i++){
        if(i >= refLen) break;
        vec2 Z = texelFetch(uRef, ivec2(i,0), 0).rg;
        vec2 z = Z + d;
        r2 = dot(z, z);
        if(r2 > 256.0){ n = float(i); esc = true; break; }
        d = cmul(2.0*Z, d) + cmul(d, d) + dc;
        n = float(i) + 1.0;
    }
    if(!esc) return vec3(0.016, 0.016, 0.03);
    float sn = n - log2(log2(r2)) + 4.0;
    return clamp(pal(sn*0.028 + 0.5)*1.4, 0.0, 1.0);
}

void mainImage(out vec4 o, in vec2 fc){
    vec3 col = vec3(0.0);
    for(int j=0;j<AA;j++) for(int i=0;i<AA;i++){
        vec2 off = (vec2(float(i), float(j)) + 0.5)/float(AA) - 0.5;
        vec2 uv = (fc + off - 0.5*iResolution.xy)/iResolution.y;
        col += mbSample(uv);
    }
    col /= float(AA*AA);
    col = pow(col, vec3(0.4545));                          // gamma -> vivid
    vec2 uvc = (fc - 0.5*iResolution.xy)/iResolution.y;
    col *= 1.0 - 0.26*dot(uvc, uvc);                       // vignette (no fade to black)
    o = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:2rem">WebGL2 not supported.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime;
uniform sampler2D uRef; uniform float uRefLen; uniform float uScale;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }

const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos');
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const b = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, b);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'iResolution'), uTime=gl.getUniformLocation(prog,'iTime');
const uRef=gl.getUniformLocation(prog,'uRef'), uRefLn=gl.getUniformLocation(prog,'uRefLen'), uScale=gl.getUniformLocation(prog,'uScale');

// reference orbit (JS double precision) -> float texture
const REFN = 1600;
const refTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, refTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

const CX = -0.743643887037158, CY = 0.131825904205312;   // seahorse valley: colorful filigree deep
let refLen = REFN;
(function computeRef(){
  const data = new Float32Array(REFN*4);
  let zx=0, zy=0, len=REFN;
  for(let i=0;i<REFN;i++){
    data[i*4]=zx; data[i*4+1]=zy;
    const nx=zx*zx-zy*zy+CX, ny=2*zx*zy+CY; zx=nx; zy=ny;
    if(zx*zx+zy*zy>1e8){ len=i+1; break; }
  }
  gl.bindTexture(gl.TEXTURE_2D, refTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, REFN, 1, 0, gl.RGBA, gl.FLOAT, data);
  refLen = len;
})();

// ---- continuous ping-pong dive (no black, no cuts) ------------------------
const ZMIN = 4.0, ZMAX = 14.5;   // stay in the colorful filigree (zoom <4 is the dark "neck")
let zoom = ZMIN, dir = 1, paused = false;
let speedUI = 0.38;                       // 0..1 from the slider
function curSpeed(){ return 0.15 + speedUI*1.6; }   // zoom units / second

const playBtn = document.getElementById('play');
document.getElementById('slow').onclick = () => { const s=document.getElementById('spd'); s.value=Math.max(0,+s.value-12); speedUI=s.value/100; };
document.getElementById('fast').onclick = () => { const s=document.getElementById('spd'); s.value=Math.min(100,+s.value+12); speedUI=s.value/100; };
document.getElementById('spd').addEventListener('input', e => { speedUI = e.target.value/100; });
playBtn.onclick = () => { paused = !paused; playBtn.textContent = paused ? '▶' : '⏸'; };

function resize(){ const dpr=Math.min(devicePixelRatio||1, 1.5);
  canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); }
resize(); addEventListener('resize', resize);

const t0 = performance.now(); let last = t0;
function frame(now){
  const dt = Math.min((now-last)/1000, 0.05); last = now;
  if(!paused){
    zoom += curSpeed()*dir*dt;
    if(zoom >= ZMAX){ zoom = ZMAX; dir = -1; }   // turn around smoothly (no cut, no black)
    if(zoom <= ZMIN){ zoom = ZMIN; dir =  1; }
  }
  const scale = 1.6 * Math.pow(0.16, zoom);

  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, refTex);
  gl.uniform1i(uRef, 0);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (now-t0)/1000);
  gl.uniform1f(uRefLn, refLen);
  gl.uniform1f(uScale, scale);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
