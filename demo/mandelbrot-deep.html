<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mandelbrot — deep zoom (perturbation)</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;cursor:grab;}
  body.grabbing{cursor:grabbing;}
  canvas{display:block;width:100vw;height:100vh;}
  .hud{position:fixed;left:24px;top:20px;color:#eee;font:600 14px/1.4 ui-monospace,"SF Mono",Menlo,monospace;
       letter-spacing:.04em;text-shadow:0 2px 8px #000;pointer-events:none;}
  .hud .tag{background:#6fb7ff;color:#06121f;padding:4px 10px;border-radius:7px;}
  .mag{position:fixed;left:24px;top:50px;color:#9fb4cc;font:600 12px/1.4 ui-monospace,monospace;text-shadow:0 2px 8px #000;pointer-events:none;}
  .hint{position:fixed;left:0;right:0;bottom:30px;text-align:center;color:#cfd4e2;
        font:500 17px/1.4 Helvetica,Arial,sans-serif;text-shadow:0 2px 10px #000;pointer-events:none;transition:opacity .8s;}
  .credit{position:fixed;right:24px;bottom:22px;font:600 13px/1.3 ui-monospace,monospace;}
  .credit a{color:#ffd9a0;text-decoration:none;pointer-events:auto;text-shadow:0 2px 8px #000;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud"><span class="tag">z → z² + c</span> &nbsp;deep zoom · perturbation theory</div>
<div class="mag" id="mag">magnification ×1</div>
<div class="hint" id="hint">it dives forever · scroll to change speed · drag to steer</div>
<div class="credit"><a href="https://franpiaggio.github.io/interactive-shader-course/" target="_blank">learn how → interactive-shader-course</a></div>

<script id="frag" type="x-shader/fragment">
// Perturbation: one high-precision reference orbit Z_n (computed in JS double, stored in
// a float texture) lets every pixel iterate only a SMALL delta d in float:
//   d_{n+1} = 2·Z_n·d_n + d_n² + dc ,   actual orbit z_n = Z_n + d_n
// The precision lives in the reference, so the float deltas stay tiny and accurate far
// past where plain float graininess sets in.
#define NMAX 900

vec3 pal(float t){ return 0.5 + 0.5*cos(6.28318530718*(t + vec3(0.0,0.33,0.62))); }
vec2 cmul(vec2 a, vec2 b){ return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }

void mainImage(out vec4 o, in vec2 fc){
    vec2 uv = (fc - 0.5*iResolution.xy)/iResolution.y;
    vec2 dc = uv*uScale;                       // this pixel's offset from the reference center

    int refLen = int(uRefLen + 0.5);
    vec2 d = vec2(0.0);
    float n = 0.0, r2 = 0.0;
    bool escaped = false;
    for(int i=0;i<NMAX;i++){
        if(i >= refLen) break;
        vec2 Z = texelFetch(uRef, ivec2(i, 0), 0).rg;   // reference orbit Z_i
        vec2 z = Z + d;                                  // true orbit point
        r2 = dot(z, z);
        if(r2 > 256.0){ n = float(i); escaped = true; break; }
        d = cmul(2.0*Z, d) + cmul(d, d) + dc;            // advance the small delta
        n = float(i) + 1.0;
    }

    vec3 col;
    if(!escaped){
        col = vec3(0.015, 0.015, 0.03);                  // never escaped -> inside the set
    } else {
        float sn = n - log2(log2(r2)) + 4.0;             // smooth iteration count
        col = pal(sn*0.028 + 0.5);                       // vivid cyclic color by escape speed
    }

    col = pow(clamp(col*1.35, 0.0, 1.0), vec3(0.4545));  // exposure + gamma -> vivid
    col *= 1.0 - 0.30*dot(uv, uv);                       // vignette
    col *= uFade;                                        // dip to black across the loop seam
    o = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:2rem">WebGL2 not supported.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime;
uniform sampler2D uRef; uniform float uRefLen; uniform float uScale; uniform float uFade;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }

const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos');
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const uRes  = gl.getUniformLocation(prog,'iResolution');
const uTime  = gl.getUniformLocation(prog,'iTime');
const uRef   = gl.getUniformLocation(prog,'uRef');
const uRefLn = gl.getUniformLocation(prog,'uRefLen');
const uScale = gl.getUniformLocation(prog,'uScale');
const uFade  = gl.getUniformLocation(prog,'uFade');

// ---- reference orbit (computed in JS double precision) --------------------
const REFN = 1400;
const refTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, refTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

// rich seahorse-valley points to dive into (cycled so each dive lands somewhere new)
const TARGETS = [
  [-0.743643887037158, 0.131825904205312],
  [-0.748986109301866, 0.065056082508456],
  [-0.745428,          0.113009         ],
  [ 0.432539867,       0.226118675      ],
];
let refLen = REFN;
function computeRef(cx, cy){
  const data = new Float32Array(REFN*4);
  let zx = 0.0, zy = 0.0, len = REFN;
  for(let i=0;i<REFN;i++){
    data[i*4] = zx; data[i*4+1] = zy;
    const nx = zx*zx - zy*zy + cx;
    const ny = 2.0*zx*zy + cy;
    zx = nx; zy = ny;
    if(zx*zx + zy*zy > 1e8){ len = i+1; break; }   // reference escaped (rare for boundary pts)
  }
  gl.bindTexture(gl.TEXTURE_2D, refTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, REFN, 1, 0, gl.RGBA, gl.FLOAT, data);
  refLen = len;
}

// ---- endless dive ---------------------------------------------------------
// Plain float would grain out past ~zoom 6; perturbation stays crisp to ~zoom 15
// (magnification ~10^11). We dive there, fade through black, switch to the next
// target, and dive again -> it never stops, and never repeats the same place.
const ZMIN = 2.0, ZMAX = 15.0, FADE = 1.2;
let zoom = ZMIN, speed = 0.55, ti = 0;
computeRef(TARGETS[0][0], TARGETS[0][1]);

let dragging = false, lastX = 0, lastY = 0;
const hint = document.getElementById('hint'), magEl = document.getElementById('mag');
function clamp(v,a,b){ return Math.min(b, Math.max(a, v)); }

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  speed = clamp(speed - e.deltaY * 0.0016, -2.5, 2.5);
  hint.style.opacity = '0';
}, {passive:false});
canvas.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  document.body.classList.add('grabbing'); hint.style.opacity = '0';
  canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if(!dragging) return;
  // steering would need the reference recomputed at the new center; keep it simple: ignore
  lastX = e.clientX; lastY = e.clientY;
});
function endDrag(){ dragging = false; document.body.classList.remove('grabbing'); }
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

function resize(){ const dpr=0.62;   // render at reduced resolution: the per-pixel orbit loop is heavy
  canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); }
resize(); addEventListener('resize', resize);

const t0 = performance.now();
let last = t0;
function frame(now){
  const dt = Math.min((now - last)/1000, 0.10); last = now;
  zoom += speed*dt;
  if(zoom >= ZMAX){ zoom = ZMIN + (zoom - ZMAX); ti = (ti+1)%TARGETS.length; computeRef(TARGETS[ti][0], TARGETS[ti][1]); }
  if(zoom <  ZMIN){ zoom = ZMAX - (ZMIN - zoom); ti = (ti+TARGETS.length-1)%TARGETS.length; computeRef(TARGETS[ti][0], TARGETS[ti][1]); }
  const fade = clamp(Math.min(zoom - ZMIN, ZMAX - zoom) / FADE, 0.0, 1.0);
  const scale = 1.6 * Math.pow(0.16, zoom);

  magEl.textContent = 'magnification ×' + (1.6/scale).toExponential(1);

  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, refTex);
  gl.uniform1i(uRef, 0);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (now-t0)/1000);
  gl.uniform1f(uRefLn, refLen);
  gl.uniform1f(uScale, scale);
  gl.uniform1f(uFade, fade);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
