<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Julia 2D Zoom</title>
<style>
  :root{ --accent:#c79bff; }
  html,body{margin:0;height:100%;background:radial-gradient(circle at 50% 30%, #150f25, #05070d 70%);overflow:hidden;
    font-family:Helvetica,Arial,sans-serif;color:#eaf0ff;}
  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;box-sizing:border-box;}
  .title{font-size:34px;font-weight:800;letter-spacing:-0.01em;text-align:center;text-shadow:0 2px 20px rgba(0,0,0,.6);}
  .stage{position:relative;width:min(860px,92vw);aspect-ratio:16/9;border-radius:16px;overflow:hidden;
    box-shadow:0 24px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06) inset;background:#000;}
  canvas{display:block;width:100%;height:100%;}
  .bar{display:flex;align-items:center;gap:14px;padding:10px 16px;border-radius:999px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);}
  .btn{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,0.12);color:#eaf0ff;
    font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .btn:hover{background:rgba(255,255,255,0.24);}
  input[type=range]{-webkit-appearance:none;appearance:none;width:150px;height:4px;border-radius:4px;
    background:rgba(255,255,255,0.22);outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:var(--accent);cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Julia 2D Zoom</div>
  <div class="stage"><canvas id="c"></canvas></div>
  <div class="bar">
    <button class="btn" id="slow" title="back">«</button>
    <button class="btn" id="play" title="play / pause">⏸</button>
    <button class="btn" id="fast" title="deeper">»</button>
    <input id="spd" type="range" min="-100" max="100" value="34" title="speed (left = back, right = deeper)">
  </div>
</div>

<script id="frag" type="x-shader/fragment">
// Julia set (fixed c): z -> z^2 + c, colored by escape speed. Continuous dive into a spiral.
#define ITER 640
#define AA 2
vec3 pal(float t){ return 0.5 + 0.5*cos(6.28318530718*(t + vec3(0.0,0.33,0.62))); }
vec2 cmul(vec2 a, vec2 b){ return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }

vec3 julia(vec2 z, vec2 c){
  float n = 0.0, r2 = 0.0;
  for(int i=0;i<ITER;i++){ z = cmul(z,z) + c; r2 = dot(z,z); if(r2>256.0) break; n += 1.0; }
  if(r2 <= 256.0) return vec3(0.02,0.01,0.05);      // interior -> near black
  float sn = n - log2(log2(r2)) + 4.0;
  return pal(sn*0.028 + 0.6);
}
void mainImage(out vec4 o, in vec2 fc){
  vec3 col = vec3(0.0);
  for(int j=0;j<AA;j++) for(int i=0;i<AA;i++){
    vec2 off = (vec2(float(i), float(j)) + 0.5)/float(AA) - 0.5;
    vec2 uv = (fc + off - 0.5*iResolution.xy)/iResolution.y;
    col += julia(uv*uScale + vec2(uCx, uCy), vec2(uJx, uJy));
  }
  col /= float(AA*AA);
  col = pow(col, vec3(0.4545));
  vec2 uvc = (fc - 0.5*iResolution.xy)/iResolution.y;
  col *= 1.0 - 0.24*dot(uvc, uvc);                   // vignette
  o = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:2rem">WebGL2 not supported.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime;
uniform float uScale, uCx, uCy, uJx, uJy;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;
function sh(t,s){ const x=gl.createShader(t); gl.shaderSource(x,s); gl.compileShader(x);
  if(!gl.getShaderParameter(x,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(x)); return x; }
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos'); gl.linkProgram(prog); gl.useProgram(prog);
const b=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,b);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
const U = n => gl.getUniformLocation(prog,n);
const uRes=U('iResolution'), uTime=U('iTime'), uScale=U('uScale'),
      uCx=U('uCx'), uCy=U('uCy'), uJx=U('uJx'), uJy=U('uJy');

// ---- one continuous zoom into a spiral, then stop (slide left to go back) ---
// Fixed Julia constant with rich spiral arms; we dive into a boundary spiral center.
// Designed spiral: pick multiplier lambda = 1.107*e^(i*72deg) -> c = lambda/2 - lambda^2/4.
// alpha = lambda/2 is then exactly a repelling focus with a clean 5-arm spiral.
const JX = 0.418895, JY = 0.346338;       // the Julia constant c
const CX = 0.171043, CY = 0.526411;       // alpha fixed point -> 5-arm spiral focus
const ZMIN = 2.0, ZMAX = 5.2;            // start already inside the star; float stays crisp to ZMAX
let zoom = 2.5, paused = false, speedUI = 0.34;
function curSpeed(){ return speedUI * 0.6; }

const playBtn = document.getElementById('play'), spd = document.getElementById('spd');
document.getElementById('slow').onclick = () => { spd.value = Math.max(-100, +spd.value-15); speedUI = spd.value/100; };
document.getElementById('fast').onclick = () => { spd.value = Math.min( 100, +spd.value+15); speedUI = spd.value/100; };
spd.addEventListener('input', e => { speedUI = e.target.value/100; });
playBtn.onclick = () => { paused = !paused; playBtn.textContent = paused ? '▶' : '⏸'; };

function resize(){ const dpr=Math.min(devicePixelRatio||1, 1.3);
  canvas.width=Math.floor(canvas.clientWidth*dpr); canvas.height=Math.floor(canvas.clientHeight*dpr); }
resize(); addEventListener('resize', resize);

const t0 = performance.now(); let last = t0;
function frame(now){
  const dt = Math.min((now-last)/1000, 0.05); last = now;
  if(!paused){
    zoom += curSpeed()*dt;
    if(zoom > ZMAX) zoom = ZMAX;
    if(zoom < ZMIN) zoom = ZMIN;
  }
  const scale = 2.6 * Math.pow(0.16, zoom);
  gl.useProgram(prog);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (now-t0)/1000);
  gl.uniform1f(uScale, scale);
  gl.uniform1f(uCx, CX); gl.uniform1f(uCy, CY);
  gl.uniform1f(uJx, JX); gl.uniform1f(uJy, JY);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
