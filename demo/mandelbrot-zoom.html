<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mandelbrot — endless zoom</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;cursor:grab;}
  body.grabbing{cursor:grabbing;}
  canvas{display:block;width:100vw;height:100vh;}
  .hud{position:fixed;left:24px;top:20px;color:#eee;font:600 14px/1.4 ui-monospace,"SF Mono",Menlo,monospace;
       letter-spacing:.04em;text-shadow:0 2px 8px #000;pointer-events:none;}
  .hud .tag{background:#6fb7ff;color:#06121f;padding:4px 10px;border-radius:7px;}
  .hint{position:fixed;left:0;right:0;bottom:30px;text-align:center;color:#cfd4e2;
        font:500 17px/1.4 Helvetica,Arial,sans-serif;text-shadow:0 2px 10px #000;
        pointer-events:none;transition:opacity .8s;}
  .credit{position:fixed;right:24px;bottom:22px;font:600 13px/1.3 ui-monospace,monospace;}
  .credit a{color:#ffd9a0;text-decoration:none;pointer-events:auto;text-shadow:0 2px 8px #000;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud"><span class="tag">z → z² + c</span> &nbsp;the Mandelbrot set · endless zoom</div>
<div class="hint" id="hint">it zooms by itself · scroll to change speed or direction · drag to steer</div>
<div class="credit"><a href="https://franpiaggio.github.io/interactive-shader-course/" target="_blank">learn how → interactive-shader-course</a></div>

<script id="frag" type="x-shader/fragment">
vec3 pal(float t){ vec3 c = 0.5 + 0.5*cos(6.28318530718*(t + vec3(0.0,0.12,0.32))); return c*c*(3.0 - 2.0*c); }

// color one complex point c by escape speed (smooth iteration count)
vec3 mb(vec2 c){
  vec2 z = vec2(0.0);
  float n = 0.0, r2 = 0.0;
  for(int i=0;i<560;i++){
    z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
    r2 = dot(z, z);
    if(r2 > 256.0) break;
    n += 1.0;
  }
  if(r2 <= 256.0) return vec3(0.02, 0.02, 0.04);            // inside the set -> near black
  float sn = n - log2(log2(r2)) + 4.0;
  vec3 col = pal(0.15 + sn*(0.024 + 0.006*uZoom));          // base 0.15 = bright orange field
  return col * 1.7;                                          // exposure boost
}

void mainImage(out vec4 o, in vec2 fc){
  float scale = 1.6 * pow(0.16, uZoom);
  vec2  ctr = vec2(uCx, uCy);
  // 2x2 supersampling so the infinitely-detailed boundary stays smooth as we zoom
  vec3 acc = vec3(0.0);
  for(int j=0;j<2;j++) for(int i=0;i<2;i++){
    vec2 off = (vec2(float(i), float(j)) + 0.5)*0.5 - 0.5;
    vec2 uv = (fc + off - 0.5*iResolution.xy)/iResolution.y;
    acc += mb(uv*scale + ctr);
  }
  vec3 col = acc*0.25;
  col = pow(clamp(col, 0.0, 1.0), vec3(0.4545));            // gamma -> lifts mid-tones, vivid
  vec2 uvc = (fc - 0.5*iResolution.xy)/iResolution.y;
  col *= 1.0 - 0.32*dot(uvc, uvc);                          // vignette
  col *= uFade;                                             // dip to black across the seamless loop
  o = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:2rem">WebGL2 not supported.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime;
uniform float uZoom; uniform float uCx; uniform float uCy; uniform float uFade;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }

const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos');
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const uRes  = gl.getUniformLocation(prog,'iResolution');
const uTime = gl.getUniformLocation(prog,'iTime');
const uZoom = gl.getUniformLocation(prog,'uZoom');
const uCx   = gl.getUniformLocation(prog,'uCx');
const uCy   = gl.getUniformLocation(prog,'uCy');
const uFade = gl.getUniformLocation(prog,'uFade');

// ---- endless zoom ---------------------------------------------------------
// 32-bit float can't zoom forever (it grains out past ~6), so the dive LOOPS within a
// band of depths, always inside the fractal's filigree. A short dip to black across the
// seam hides the wrap, so it reads as one continuous, never-ending zoom.
const ZMIN = 2.4, ZMAX = 4.6, FADE = 0.6;
let zoom = ZMIN;
let speed = 0.18;            // zoom units per SECOND (time-based, so it's the same on any machine)
let cx = -0.745428, cy = 0.113009;   // a dense seahorse spiral, vivid at float-safe depth
let dragging = false, lastX = 0, lastY = 0;
const hint = document.getElementById('hint');

function clamp(v,a,b){ return Math.min(b, Math.max(a, v)); }

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  speed = clamp(speed - e.deltaY * 0.0010, -1.6, 1.6);      // up = faster in, down = slower / reverse
  hint.style.opacity = '0';
}, {passive:false});

canvas.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  document.body.classList.add('grabbing'); hint.style.opacity = '0';
  canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if(!dragging) return;
  const scale = 1.6 * Math.pow(0.16, zoom);
  const k = scale / canvas.clientHeight * (Math.min(devicePixelRatio||1,1.5));
  cx -= (e.clientX - lastX) * scale / canvas.clientHeight * 2.0;
  cy += (e.clientY - lastY) * scale / canvas.clientHeight * 2.0;
  lastX = e.clientX; lastY = e.clientY;
});
function endDrag(){ dragging = false; document.body.classList.remove('grabbing'); }
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

function resize(){ const dpr=Math.min(devicePixelRatio||1,1.0);   // 1.0 keeps the heavy shader smooth
  canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); }
resize(); addEventListener('resize', resize);

const SPAN = ZMAX - ZMIN;
const t0 = performance.now();
let last = t0;
function frame(now){
  const dt = Math.min((now - last)/1000, 0.05); last = now;   // time-based so speed is machine-independent
  zoom += speed*dt;
  if(zoom >= ZMAX) zoom -= SPAN;              // wrap forward, staying inside the filigree
  if(zoom < ZMIN)  zoom += SPAN;              // wrap backward
  const fade = clamp(Math.min(zoom - ZMIN, ZMAX - zoom) / FADE, 0.0, 1.0);  // black across the seam

  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (now-t0)/1000);
  gl.uniform1f(uZoom, zoom);
  gl.uniform1f(uCx, cx);
  gl.uniform1f(uCy, cy);
  gl.uniform1f(uFade, fade);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
