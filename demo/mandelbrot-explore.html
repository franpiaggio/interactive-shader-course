<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mandelbrot — point to explore</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;cursor:none;}
  canvas{display:block;width:100vw;height:100vh;}
  /* the aiming ring follows the mouse and marks where the zoom dives */
  #ring{position:fixed;left:0;top:0;width:52px;height:52px;border:2px solid rgba(255,255,255,.85);
    border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;mix-blend-mode:difference;
    box-shadow:0 0 14px rgba(0,0,0,.5);transition:width .12s,height .12s,opacity .2s;}
  #ring::before{content:"";position:absolute;left:50%;top:50%;width:5px;height:5px;border-radius:50%;
    background:#fff;transform:translate(-50%,-50%);}
  #ring.z::before{box-shadow:0 0 0 1px #fff;}
  .hud{position:fixed;left:22px;top:18px;color:#eee;font:600 14px/1.5 ui-monospace,"SF Mono",Menlo,monospace;
    letter-spacing:.03em;text-shadow:0 2px 8px #000;pointer-events:none;}
  .hud .tag{background:#6fb7ff;color:#06121f;padding:4px 10px;border-radius:7px;}
  .hint{position:fixed;left:0;right:0;bottom:28px;text-align:center;color:#cfd4e2;
    font:500 16px/1.4 Helvetica,Arial,sans-serif;text-shadow:0 2px 10px #000;pointer-events:none;transition:opacity .8s;}
  .credit{position:fixed;right:22px;bottom:18px;font:600 12px/1.3 ui-monospace,monospace;}
  .credit a{color:#ffd9a0;text-decoration:none;pointer-events:auto;text-shadow:0 2px 8px #000;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ring"></div>
<div class="hud"><span class="tag">z → z² + c</span> &nbsp;point to explore the Mandelbrot set</div>
<div class="hint" id="hint">move the mouse to aim · it dives toward the ring · scroll to zoom · double-click to reset</div>
<div class="credit"><a href="https://franpiaggio.github.io/interactive-shader-course/" target="_blank">learn how → interactive-shader-course</a></div>

<script id="frag" type="x-shader/fragment">
#define ITER 480
vec3 pal(float t){ return 0.5 + 0.5*cos(6.28318530718*(t + vec3(0.0,0.33,0.62))); }
vec2 cmul(vec2 a, vec2 b){ return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }

vec3 mb(vec2 c){
  vec2 z = vec2(0.0); float n = 0.0, r2 = 0.0;
  for(int i=0;i<ITER;i++){ z = cmul(z,z) + c; r2 = dot(z,z); if(r2>256.0) break; n += 1.0; }
  if(r2 <= 256.0) return vec3(0.015,0.015,0.03);
  float sn = n - log2(log2(r2)) + 4.0;
  return pal(sn*0.03 + 0.55);
}
void mainImage(out vec4 o, in vec2 fc){
  vec2 uv = (fc - 0.5*iResolution.xy)/iResolution.y;
  vec3 col = mb(uv*uScale + vec2(uCx, uCy));
  col = pow(col, vec3(0.4545));
  o = vec4(col, 1.0);
}
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:false});
if(!gl){ document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:2rem">WebGL2 not supported.</p>'; }

const VERT = `#version 300 es
in vec2 aPos; void main(){ gl_Position=vec4(aPos,0.0,1.0); }`;
const PRE = `#version 300 es
precision highp float;
uniform vec3 iResolution; uniform float iTime;
uniform float uScale; uniform float uCx; uniform float uCy;
out vec4 _fragColor;
`;
const POST = `\nvoid main(){ mainImage(_fragColor, gl_FragCoord.xy); }`;
function sh(t,s){ const x=gl.createShader(t); gl.shaderSource(x,s); gl.compileShader(x);
  if(!gl.getShaderParameter(x,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(x)); return x; }
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, PRE + document.getElementById('frag').textContent + POST));
gl.bindAttribLocation(prog, 0, 'aPos'); gl.linkProgram(prog); gl.useProgram(prog);
const b=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,b);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
const uRes=gl.getUniformLocation(prog,'iResolution'), uTime=gl.getUniformLocation(prog,'iTime');
const uScale=gl.getUniformLocation(prog,'uScale'), uCx=gl.getUniformLocation(prog,'uCx'), uCy=gl.getUniformLocation(prog,'uCy');

// ---- state ----------------------------------------------------------------
let cx = -0.5, cy = 0.0, scale = 1.5;
const S_MIN = 1.5*Math.pow(0.16, 5.6);   // stop at the 32-bit float limit
const S_MAX = 2.2;
let over = false, mCX = innerWidth/2, mCY = innerHeight/2;
const ring = document.getElementById('ring'), hint = document.getElementById('hint');

function dpr(){ return Math.min(devicePixelRatio||1, 1.25); }
// mouse pixel -> the uv the shader uses (device px, y flipped like gl_FragCoord)
function mouseUV(){
  const d = dpr();
  const mdx = mCX*d, mdy = (innerHeight - mCY)*d;
  return [ (mdx - 0.5*canvas.width)/canvas.height, (mdy - 0.5*canvas.height)/canvas.height ];
}
// zoom keeping the point under the cursor fixed -> dives toward the ring
function zoomToCursor(factor){
  const [ux,uy] = mouseUV();
  const cmx = cx + ux*scale, cmy = cy + uy*scale;
  scale = Math.min(S_MAX, Math.max(S_MIN, scale*factor));
  cx = cmx - ux*scale; cy = cmy - uy*scale;
}

canvas.addEventListener('pointermove', e => {
  mCX = e.clientX; mCY = e.clientY; over = true;
  ring.style.left = e.clientX+'px'; ring.style.top = e.clientY+'px';
  hint.style.opacity = '0';
});
canvas.addEventListener('pointerleave', () => { over = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoomToCursor(e.deltaY > 0 ? 1.12 : 0.9);   // scroll to zoom in/out toward the cursor
}, {passive:false});
addEventListener('dblclick', () => { cx=-0.5; cy=0.0; scale=1.5; });   // reset

function resize(){ const d=dpr(); canvas.width=Math.floor(innerWidth*d); canvas.height=Math.floor(innerHeight*d); }
resize(); addEventListener('resize', resize);

const t0 = performance.now();
function frame(){
  if(over && scale > S_MIN) zoomToCursor(0.992);        // gentle auto-dive toward where you point
  ring.classList.toggle('z', over && scale > S_MIN*1.01);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform3f(uRes, canvas.width, canvas.height, 1);
  gl.uniform1f(uTime, (performance.now()-t0)/1000);
  gl.uniform1f(uScale, scale); gl.uniform1f(uCx, cx); gl.uniform1f(uCy, cy);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
